<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>Portfolio Analytics</title>
    <style>
      :root {
        --bg: #070707;
        --fg: #f7f5ef;
        --muted: rgba(247, 245, 239, 0.62);
        --line: rgba(247, 245, 239, 0.22);
        --panel: rgba(247, 245, 239, 0.045);
        --bad: #ffb4a8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      main {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: clamp(18px, 4vw, 54px);
      }

      header {
        min-height: 38svh;
        display: grid;
        align-content: end;
        gap: 18px;
        padding-bottom: 32px;
      }

      h1,
      h2 {
        margin: 0;
        font-family: "Bodoni 72", "Didot", "Baskerville", Georgia, serif;
        font-weight: 500;
        line-height: 0.94;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      h1 {
        font-size: clamp(46px, 9vw, 126px);
      }

      h2 {
        font-size: clamp(26px, 4vw, 52px);
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--fg);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        padding: 10px 14px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 22px 0 48px;
      }

      .card,
      .table-card {
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 18px;
      }

      .metric {
        display: grid;
        gap: 8px;
      }

      .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: clamp(24px, 4vw, 52px);
      }

      .sections {
        display: grid;
        gap: 18px;
      }

      .table-card {
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.13em;
      }

      td {
        color: rgba(247, 245, 239, 0.84);
        overflow-wrap: anywhere;
      }

      .bad {
        color: var(--bad);
      }

      .empty {
        padding: 18px 0 4px;
        color: var(--muted);
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="label">Hidden internal page</p>
        <h1>Portfolio Analytics</h1>
        <div class="toolbar">
          <button id="refresh" type="button">Refresh</button>
          <button id="sendTest" type="button">Send test event</button>
          <p id="status">Loading...</p>
        </div>
      </header>

      <section class="grid" aria-label="Metrics">
        <div class="card metric"><span class="label">Events</span><span class="value" id="total">0</span></div>
        <div class="card metric"><span class="label">Pageviews</span><span class="value" id="pageviews">0</span></div>
        <div class="card metric"><span class="label">Clicks</span><span class="value" id="clicks">0</span></div>
        <div class="card metric"><span class="label">Errors</span><span class="value bad" id="errors">0</span></div>
      </section>

      <section class="sections">
        <article class="table-card">
          <h2>Top Paths</h2>
          <div id="paths"></div>
        </article>
        <article class="table-card">
          <h2>Recent Clicks</h2>
          <div id="recentClicks"></div>
        </article>
        <article class="table-card">
          <h2>Recent Errors</h2>
          <div id="recentErrors"></div>
        </article>
        <article class="table-card">
          <h2>Recent Events</h2>
          <div id="events"></div>
        </article>
      </section>
    </main>

    <script>
      const endpoint = "/.netlify/functions/analytics";
      const status = document.querySelector("#status");

      function readToken() {
        const params = new URLSearchParams(location.search);
        const token = params.get("token") || localStorage.getItem("portfolioAnalyticsToken") || "";
        if (params.get("token")) {
          localStorage.setItem("portfolioAnalyticsToken", params.get("token"));
          history.replaceState(null, "", location.pathname);
        }
        return token;
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      function table(target, columns, rows, emptyText) {
        const node = document.querySelector(target);
        if (!rows.length) {
          node.innerHTML = `<p class="empty">${emptyText}</p>`;
          return;
        }
        node.innerHTML = `
          <table>
            <thead><tr>${columns.map((col) => `<th>${escapeHtml(col.label)}</th>`).join("")}</tr></thead>
            <tbody>
              ${rows.map((row) => `
                <tr>${columns.map((col) => `<td>${escapeHtml(col.value(row))}</td>`).join("")}</tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      async function load() {
        status.textContent = "Loading...";
        const token = readToken();
        const response = await fetch(endpoint + "?limit=800", {
          cache: "no-store",
          headers: token ? { "x-portfolio-analytics-token": token } : {},
        });
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || "analytics failed");

        const summary = data.summary || {};
        const byType = summary.byType || {};
        document.querySelector("#total").textContent = summary.total || 0;
        document.querySelector("#pageviews").textContent = byType.pageview || 0;
        document.querySelector("#clicks").textContent = (byType.click || 0) + (byType.case_open || 0);
        document.querySelector("#errors").textContent = (byType.client_error || 0) + (byType.resource_error || 0);

        table("#paths", [
          { label: "Path", value: (row) => row.path },
          { label: "Count", value: (row) => row.count },
        ], summary.byPath || [], "No path data yet.");

        table("#recentClicks", [
          { label: "Time", value: (row) => new Date(row.ts).toLocaleString() },
          { label: "Type", value: (row) => row.type },
          { label: "Label", value: (row) => row.label || row.target },
          { label: "Path", value: (row) => row.path },
        ], summary.recentClicks || [], "No clicks yet.");

        table("#recentErrors", [
          { label: "Time", value: (row) => new Date(row.ts).toLocaleString() },
          { label: "Type", value: (row) => row.type },
          { label: "Message", value: (row) => row.message },
          { label: "Source", value: (row) => row.source },
        ], summary.recentErrors || [], "No client errors reported.");

        table("#events", [
          { label: "Time", value: (row) => new Date(row.ts).toLocaleString() },
          { label: "Type", value: (row) => row.type },
          { label: "Path", value: (row) => row.path },
          { label: "Viewport", value: (row) => `${row.viewport?.width || "-"} x ${row.viewport?.height || "-"}` },
        ], data.events || [], "No events yet.");

        status.textContent = `Updated ${new Date(data.generatedAt).toLocaleString()}`;
      }

      async function sendTest() {
        await fetch(endpoint, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            type: "click",
            data: {
              path: location.pathname,
              label: "analytics test event",
              viewport: { width: innerWidth, height: innerHeight },
            },
          }),
        });
        await load();
      }

      document.querySelector("#refresh").addEventListener("click", () => load().catch((error) => {
        status.textContent = error.message;
      }));
      document.querySelector("#sendTest").addEventListener("click", () => sendTest().catch((error) => {
        status.textContent = error.message;
      }));

      load().catch((error) => {
        status.textContent = error.message;
      });
    </script>
  </body>
</html>
